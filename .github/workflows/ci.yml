name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run tests
        run: ./gradlew :fsensor:allTests

      - name: Build Android release
        run: ./gradlew :fsensor:assembleRelease

      - name: Build XCFramework
        run: ./gradlew :fsensor:assembleFSensorReleaseXCFramework

      - name: Build demo app
        run: ./gradlew :fsensorapp:assembleDebug
